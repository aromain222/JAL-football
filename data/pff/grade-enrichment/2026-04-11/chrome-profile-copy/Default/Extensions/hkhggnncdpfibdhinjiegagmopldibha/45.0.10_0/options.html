<!DOCTYPE html>
<html>
<head>
  	<title>Checker Plus for Google Calendar - Options</title>
  	<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>

    <link rel="stylesheet" href="css/jdom.css">

	<style>
		:root {
            --header-bg-color: #3B95D2;
            --gap: 30px;
        }

		body {
            font-size: 16px;
            overflow-y: scroll;
        }

        fieldset {
            margin-block: 15px;
        }

        .label-text, select {
            width: 200px;
        }

        .col-gap {
            column-gap: 15px;
        }

        j-button[icon="help"]:not(.raised) {
            opacity: 0.3;
        }

        label:has(input[type="checkbox"]) + * > j-button[icon="help"] {
            --icon-only-padding: 0;
            margin-inline-start: 10px;
        }
		
		.hide {display:none}
		
		@-webkit-keyframes blink {
		    0% {
		        opacity:0.5;
		    }
		    50% {
		        opacity:1;
		    }
		    100% {
		        opacity:0.5;
		    }
		}
		
        #buttonPage .pin-extension {
            margin-bottom: 15px;
        }
        body.hide-pin .pin-extension {
            display: none;
        }
		
		.sliders {
            color:gray;
            font-size:0.8em;
        }
		
		.quote {color:gray}

        #generalPage label:has(select) {
            margin-block: 15px;
        }
		
		@-webkit-keyframes blink {
		    0% {
		        opacity:0.5;
		    }
		    50% {
		        opacity:1;
		    }
		    100% {
		        opacity:0.5;
		    }
		}
		
		.quote {color:gray}
		
		#notificationVoice label {transition:none}

        #dndScheduleDialog .row {
            white-space:nowrap;
            & input[type='checkbox'] {
                margin-inline: 7px;
            }
        }
        .allWeek {
            margin-top: -9px;
        }
		#dndScheduleDialog .time {display:inline-block;width:70px;margin-right:5px;text-align:right}
		#dndScheduleDialog .day {width:31px;text-align:center}
		#dndScheduleDialog .allWeek, #dndScheduleDialog .allDay {height:30px}
        .allDay,
        .allWeek {
            --icon-padding: 0;
            xx--icon-size: 14px;
        }
		
		#middle {padding:30px 10px;position:relative}
		
		[mustDonate] {opacity:0.4;transition:opacity 0.1s ease-in}
		[mustDonate]:hover {opacity:1}

		.highlight {
            outline: 4px solid red;
            border-radius: 5px;
            transition: outline 0.5s ease-in-out;
        }

		.keys td {margin:0;padding:8px 20px}
		
        .timezone-label {
            margin-inline-start: 10px;
            width: 100px;
        }

		.page {
            display: none;
            opacity: 1;
            transition-behavior: allow-discrete;
            transition: opacity 0.18s cubic-bezier(.4,0,.2,1);
            &.selected {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                xxrow-gap: var(--gap);

                @starting-style {
                    opacity: 0;
                }
            }
        }

        #welcomePage {
            row-gap: 20px;
            align-items: center;

            #guide j-button {
                min-width: 300px;
            }
        }

        #search {
            --input-padding: 6px;
            xxpadding: 2px;
            xxfont-size: 1em;
        }

        .search-result {
            outline:4px solid green;
            border-radius: 8px;
        }
        .secondary-nav li.search-result {
            outline:none;
            background-color:#0080008c;
        }

        #calendar-reminders-card {
            padding: 15px;
        }

        #calendar-reminders {
            display: flex;
            flex-direction: column;
            row-gap: 15px;

            .label-text, select {
                width: auto;
            }
        }

        #calendar-reminders .calendarReminderLine:not(:last-child) {
            padding-bottom: 10px;
            border-bottom: 1px solid var(--bg-light-color-hover);
        }

        .calendarReminderLineLabel {
            margin-top: 8px;
            xxalign-self: start;
        }

        .calendarReminderLineTitle {
            width: 200px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .calendarReminderLine:not([excluded]) .calendarReminderLineCheckbox {
            background-color: rgba(128, 128, 128, 0.315);
        }

        .colorIndicator {border-radius:50%;min-width:16px;min-height:16px}

        :is(#popupWindowNotificationOptions, .other-notification-options) label:has(select) {
            margin-block: 10px;
            margin-inline-end: 10px;
        }

        #skinsAndThemesPage th {
            text-align: left;
        }
        #skinsAndThemesPage .name {max-width:300px;overflow:hidden;padding-right:10px}
        #skinsAndThemesPage .author a[href] {color: #03a9f4; text-decoration: none}
        #skinsAndThemesPage .skinImageWrapper {width:200px;text-align:center}
        #skinsAndThemesPage .skinImage {width:40px;transition:width 0.2s ease-in}
        #skinsAndThemesPage .addSkin {opacity:0}
        #skinsAndThemesPage .skinLine:hover .addSkin {opacity:1}

  	</style>

    <script src="js/common.js"></script>
    <script src="js/jdom.js"></script>
    <script src="js/icons.js"></script>

  	<script defer src="js/checkerPlusForCalendar.js"></script>
  	<script defer src="js/options.js"></script>
  	
</head>

        <template id="notificationsPageTemplate">
            <div id="notificationsPage" class="page" value="notifications">
                <fieldset class="layout horizontal center col-gap">
                    <legend msg="notificationSound"></legend>
                    <select id="notificationSound" msgLabel="notificationSound" mustDonate storage="notificationSound">
                        <option value="" msg="off">off</option>
                        <hr>
                        <option value="ding.mp3" msg="ding"></option>
                        <option value="bellStrike.mp3">Bell Strike</option>
                        <option value="boing.mp3">Boing</option>
                        <option value="calendarReminder.mp3">Calendar reminder</option>
                        <option value="musicBox.mp3" msg="musicBox"></option>
                        <option value="reminderMale.mp3">Reminder male voice</option>
                        <option value="reminderFemale.mp3">Reminder female voice</option>
                        <option value="sunGong.mp3">Sun Gong</option>
                        <option value="youveGotAReminder.mp3">You've got a reminder</option>
                        <hr>
                        <option value="custom"><span msg="custom"></span></option>
                    </select>
                    <div id="soundOptions" class="layout horizontal center" style="gap: var(--gap);">
                        <j-button id="playNotificationSound" icon="play-arrow" class="testButton raised"></j-button>
                        <div class="layout horizontal center sliders col-gap">
                            <span msg="volume">Volume</span>
                            <input type="range" id="notificationSoundVolume" storage="notificationSoundVolume">
                        </div>
                    </div>
                </fieldset>

                <fieldset class="layout horizontal center col-gap" hide-from-firefox>
                    <legend msg="notificationTextToSpeech"></legend>
                    <label>
                        <span class="label-text" msg="notificationTextToSpeech" hidden></span>
                        <select id="notificationVoice" class="sound">
                            <option value='' msg="off">Off</option>
                            <hr>
                            <option value='native'>
                                <div two-line>
                                    <div msg="native">native</div>
                                    <div secondary>No language detection</div>
                                </div>
                            </option>
                            <hr>
                            <optgroup id="ttsVoices" label="Voices"></optgroup>
                            <hr>
                            <option value='addVoice'><span msg="addSpeechEngines">Add voice</span>...</option>
                        </select>
                        <j-tooltip msgPosition="right" for="notificationVoice" msg="notificationTextToSpeechTitle">notificationTextToSpeechTitle</j-tooltip>
                    </label>
                    <div id="voiceOptions" style="display: flex; align-items: center; gap: var(--gap)">
                        <div class="layout horizontal center">
                            <j-button id="playVoice" icon="play-arrow" class="testButton raised"></j-button>
                            <a href="https://jasonsavard.com/wiki/Voice_Notifications" target="_blank"><j-button icon="help"></j-button></a>
                        </div>
                        <div class="layout horizontal center wrap" style="gap: 10px">
                            <div class="layout horizontal center sliders col-gap">
                                <span msg="volume">Volume</span> <input id="voiceSoundVolume" storage="voiceSoundVolume" type="range"/> <span msg="pitch">Pitch</span> <input id="pitch" storage="pitch" min="0.1" max="2" step="0.1" type="range"/> <span msg="rate">Rate</span> <input id="rate" storage="rate" min="0.1" max="2" step="0.1" type="range"/>
                            </div>
                            <div>
                                <j-icon icon="format-quote" class="quote" style="transform:scaleX(-1)"></j-icon>
                                <j-input id="voiceTestText" no-label-float msgValue="voiceTest" style="width:140px"></j-input>
                                <j-icon icon="format-quote" class="quote"></j-icon>
                            </div>
                            <label>
                                <span class="label-text" msg="voiceNotificationOnlyIfIdle"></span>
                                <select id="voiceNotificationOnlyIfIdleInterval" storage="voiceNotificationOnlyIfIdleInterval">
                                    <option value="" msg="alwaysSpeak">Always speak</option>
                                    <option value="15" msg="Xseconds" msgArg1="15">15</option>
                                    <option value="30" msg="Xseconds" msgArg1="30">30</option>
                                    <option value="60" msg="Xminute" msgArg1="1">1</option>
                                    <option value="120" msg="Xminutes" msgArg1="2">2</option>
                                </select>
                            </label>
                        </div>
                    </div>
                </fieldset>

                <fieldset class="layout horizontal center col-gap">
                    <legend><span msg="showDesktopNotifications"></span></legend>
                    <select id="desktopNotification" msgLabel="showDesktopNotifications" storage="desktopNotification">
                        <option value="" msg="off">off</option>
                        <option id="textNotification" value="text" msg="textNotification">textNotification</option>
                        <option id="richNotification" value="rich" msg="richNotification">richNotification</option>
                        <option id="popupWindowNotification" value="popupWindow">
                            <div two-line>
                                <div msg="popupWindow">popupWindow</div>
                                <div secondary msg="recommended">recommended</div>
                            </div>
                        </option>
                    </select>
                    <j-tooltip for="textNotification" position="start" animation-delay="0"><span msg="textNotificationToolTip"></span></j-tooltip>
                    <j-tooltip for="richNotification" position="start" animation-delay="0"><span msg="richNotificationToolTip"></span></j-tooltip>
                    <j-tooltip for="popupWindowNotification" position="start" animation-delay="0"><span msg="popupWindowNotificationToolTip"></span></j-tooltip>
                    <j-button id="testNotification" icon="notifications" class="testButton raised"></j-button>
                    <j-tooltip for="testNotification"><span msg="testIt"></span></j-tooltip>
                    <a href="https://jasonsavard.com/wiki/Desktop_notifications" target="_blank"><j-button icon="help"></j-button></a>
                </fieldset>

                <div id="desktopNotificationOptions">
                    <div id="richNotificationOptions" class="layout horizontal center col-gap">
                        <label>
                            <span class="label-text" msg="notificationGrouping"></span>
                            <select storage="notificationGrouping">
                                <option value="groupNotifications" msg="groupNotifications">groupNotifications</option>
                                <option value="individualNotifications" value="rich" msg="individualNotifications">individualNotifications</option>
                            </select>
                        </label>

                        <label>
                            <span class="label-text" msg="hideAfter"></span>
                            <select storage="showNotificationDuration">

                                <option value="never" msg="never">never hide</option>
                            </select>
                        </label>

                        <div id="notificationButtons" class="layout horizontal center col-gap">

                                    <hr>
                                    <option class="snoozeOption" value="minutes_5" msg="Xminutes" msgArg1="5">5</option>
                                    <option class="snoozeOption" value="minutes_10" msg="Xminutes" msgArg1="10">10</option>

                                    <option class="snoozeOption" value="hours_2" msg="Xhours" msgArg1="2">2 hour</option>
                                    <option class="snoozeOption" value="hours_4" msg="Xhours" msgArg1="4">4 hour</option>
                                    <option class="snoozeOption" value="hours_8" msg="Xhours" msgArg1="8">8 hour</option>
                                    <option class="snoozeOption" value="days_1" msg="Xday" msgArg1="1">1 day</option>
                                    <option class="snoozeOption" value="days_2" msg="Xdays" msgArg1="2">2 day</option>
                                    <option class="snoozeOption" value="days_7" msg="Xdays" msgArg1="7">7 day</option>
                                    <hr>
                                    <option value="snoozeTimes" msg="moreSnoozeTimes">moreSnoozeTimes</option>
                                    <hr>
                                    <option value="location|hangout" msg="showLocationOrSource">showLocationOrSource</option>
                                    <hr>
                                    <option value="dismiss" msg="dismiss">dismiss</option>
                                </select>
                            </label>

                            <label chromium-only>
                                <span class="label-text" msg="notificationButton2"></span>
                                <select storage="notificationButton2">
                                    <option value="" msg="hideButton">hidebutton</option>
                                    <hr>
                                    <option class="snoozeOption" value="minutes_5" msg="Xminutes" msgArg1="5">5</option>
                                    <option class="snoozeOption" value="minutes_10" msg="Xminutes" msgArg1="10">10</option>
                                    <option class="snoozeOption" value="minutes_15" msg="Xminutes" msgArg1="15">15</option>
                                    <option class="snoozeOption" value="minutes_30" msg="Xminutes" msgArg1="30">30</option>
                                    <option class="snoozeOption" value="minutes_45" msg="Xminutes" msgArg1="45">45</option>
                                    <option class="snoozeOption" value="hours_1" msg="Xhour" msgArg1="1">1 hour</option>
                                    <option class="snoozeOption" value="hours_2" msg="Xhours" msgArg1="2">2 hour</option>
                                    <option class="snoozeOption" value="hours_4" msg="Xhours" msgArg1="4">4 hour</option>
                                    <option class="snoozeOption" value="hours_8" msg="Xhours" msgArg1="8">8 hour</option>
                                    <option class="snoozeOption" value="days_1" msg="Xday" msgArg1="1">1 day</option>
                                    <option class="snoozeOption" value="days_2" msg="Xdays" msgArg1="2">2 day</option>
                                    <option class="snoozeOption" value="days_7" msg="Xdays" msgArg1="7">7 day</option>
                                    <hr>
                                    <option value="snoozeTimes" msg="moreSnoozeTimes">moreSnoozeTimes</option>
                                    <hr>
                                    <option value="location|hangout" msg="showLocationOrSource">showLocationOrSource</option>
                                    <hr>
                                    <option value="dismiss" msg="dismiss">dismiss</option>
                                </select>
                            </label>
                        </div>
                    </div>

                    <div class="layout horizontal center other-notification-options col-gap">
                        <label>
                            <span class="label-text" msg="showPendingNotificationsEvery"></span>
                            <select storage="pendingNotificationsInterval">
                                <option value="" msg="off">off</option>
                                <option value="1" msg="Xminute" msgArg1="1">1</option>
                                <option value="5" msg="Xminutes" msgArg1="5">5</option>
                                <option value="10" msg="Xminutes" msgArg1="10">10</option>
                                <option value="15" msg="Xminutes" msgArg1="15">15</option>
                                <option value="30" msg="Xminutes" msgArg1="30">30</option>

                    <div class="layout horizontal center other-notification-options col-gap">
                        <label id="showCalendarNames">
                            <span class="label-text" msg="showCalendarNames"></span>
                            <select storage="showCalendarInNotification">
                                <option value="never" msg="off">off</option>

                                <option value="always" msg="always">always</option>
                            </select>
                        </label>

                    <div style="margin-block: 10px">
                        <a href="https://jasonsavard.com/wiki/Turn_off_native_notifications_from_Google_Calendar" target="_blank">
                            <j-button class="raised" msg="turnOffGoogleCalendarNotifications">Turn off Google Calendar native notifications</j-button>
                        </a>
                    </div>

                    <div id="popupWindowNotificationOptions" class="layout vertical start">
                        <div>
                            <label>
                                <span class="label-text" msg="defaultSnoozeBeforeTime"></span>
                                <select storage="defaultSnoozeBeforeTime">
                                    <option value="" msg="none">none</option>
                                    <option value="-1"><span msg="Xminute" msgArg1="-1">-1 minute</span></option>
                                    <option value="-2"><span msg="Xminutes" msgArg1="-2">-2 minutes</span></option>
                                    <option value="-5"><span msg="Xminutes" msgArg1="-5">-5 minutes</span></option>
                                </select>
                            </label>
                            
                            <label>
                                <span class="label-text" msg="defaultSnoozeTime"></span>
                                <select storage="defaultSnoozeTime">
                                    <option value="" msg="none">none</option>
                                    <option value="5"><span msg="Xminutes" msgArg1="5">5 minutes</span></option>
                                    <option value="15"><span msg="Xminutes" msgArg1="15">15 minutes</span></option>
                                    <option value="30"><span msg="Xminutes" msgArg1="30">30 minutes</span></option>
                                    <option value="60"><span msg="Xhour" msgArg1="1">1 hour</span></option>
                                    <option value="120"><span msg="Xhours" msgArg1="2">2 hours</span></option>
                                    <option value="240"><span msg="Xhours" msgArg1="4">4 hours</span></option>
                                    <option value="480"><span msg="Xhours" msgArg1="8">8 hours</span></option>
                                    <option value="1d"><span msg="Xday" msgArg1="1">1 day</span></option>
                                    <option value="2d"><span msg="Xdays" msgArg1="2">2 days</span></option>
                                    <option value="3d"><span msg="Xdays" msgArg1="3">3 days</span></option>
                                    <option value="7d"><span msg="Xdays" msgArg1="7">7 days</span></option>
                                </select>
                            </label>
                        </div>
                        
                        <div class="layout horizontal center" style="column-gap:15px">
                            <label>
                                <span class="label-text" msg="defaultEventNotificationTime"></span>

                        <span class="label-text" msg="eventConflictHandling"></span>
                        <select id="eventConflictHandling" storage="eventConflictHandling">
                            <option value="" msg="none">None</option>
                            <option value="warnForSameCalendar" msg="warnForSameCalendar">warnForSameCalendar</option>
                            <option value="warnForVisibleCalendars" msg="warnForVisibleCalendars">warnForVisibleCalendars</option>
                            <option value="warnForAnyCalendar" msg="warnForAnyCalendar">warnForAnyCalendar</option>
                        </select>
                    </label>

                    <div class="horizontal center">
                        <label>
                            <span class="label-text" msg="extensionUpdates"></span>
                            <select id="extensionUpdates" storage="extensionUpdates">
                                <option value="none" msg="noUpdateNotifications">noUpdateNotifications</option>
                                <option value="interesting" msg="showUpdateNotificationsForInterestingUpdates">showUpdateNotificationsForInterestingUpdates</option>
                                <option value="all" msg="showUpdateNotificationsForEvertyhing">showUpdateNotificationsForEvertyhing</option>
                            </select>
                        </label>
                        <a href="https://jasonsavard.com/wiki/Extension_Updates?ref=CalendarOptions" target="_blank"><j-button icon="help"></j-button></a>
                    </div>

                    <div class="card"style="margin:20px 0;padding: 10px">
                        <div>Synced from Google Calendar <a href="https://jasonsavard.com/wiki/Google_Calendar_settings" target="_blank"><j-button icon="help"></j-button></a></div>
                        <ul style="margin:0;">
                            <li>Show weekends</li>
                            <li>Show declined events</li>
                            <li>Start day of week</li>
                            <li>Date format</li>
                            <li msg="defaultEventDuration">Default meeting length</li>
                        </ul>
                    </div>

                </div>

            </div>
        </template>

        <template id="skinsAndThemesPageTemplate">
            <div id="skinsAndThemesPage" class="page" value="skinsAndThemes">
                <a href="https://jasonsavard.com/wiki/Skins_and_Themes?ref=skinOptionsTab" target="_blank"><j-button class="raised" msg="help">helpp</j-button></a>
                <br><br>
                <table id="skinsAndThemesListing">
                    <tr><th>Name</th><th style="text-align:center">Image</th><th>Author</th><th>Installs</th></tr>
                </table>
            </div>
        </template>

        <template id="accountsPageTemplate">
            <div id="accountsPage" class="page" value="accounts">

                <div id="oauthNotGranted">
                    <div id="defaultAccount" class="hide">
                        <span msg="currentDefaultHasNotBeenGrantedAccess">Your current <a target="_blank" href="https://jasonsavard.com/wiki/Using_calendars_from_multiple_accounts" msg="currentDefaultHasNotBeenGrantedAccess_DefaultAccount">default account</a> <span id="defaultAccountEmail" style="font-weight:bold" msg="currentDefaultHasNotBeenGrantedAccess_EMAIL_HERE">blah@blah.com</span>	has not been granted access!</span>
                    </div>
                    <br>
                    <j-button class="grantAccessButton colored" msg="grantAccess">Grant access</j-button>
                    <a href="https://jasonsavard.com/wiki/Granting_access" target="_blank"><j-button icon="help"></j-button></a>
                    <br><br>
                </div>

                <div id="oauthOptions" hidden class="vertical gap-20">
                    <div id="grantedTo">
                        <span msg="grantedTo" style="color:gray">Granted to</span>: <span id="emailsGrantedPermissionToContacts"></span>
                        <j-button id="grantAccessAgain"><span msg="grantAccessAgain">Grant access again</span></j-button>
                        <j-button id="revokeAccess"><span msg="revokeAccess">Revoke access</span></j-button>
                    </div>
                    <a target="_blank" href="https://jasonsavard.com/wiki/Using_calendars_from_multiple_accounts">
                        <j-button class="raised"><span msg="usingCalendarsFromMultipleAccounts">Using calendars from multiple accounts?</span></j-button>
                    </a>
                </div>

            </div>
        </template>
        
        <template id="keysPageTemplate">
            <div id="keysPage" class="page" value="keys">
                <a target="_blank" href="https://jasonsavard.com/wiki/Keyboard_shortcuts"><j-button class="raised"><span msg="calendar"></span> <span msg="keyboardShortcuts">keyboard shortcuts</span></j-button></a>
                <fieldset style="margin-block: 20px">
                    <legend msg="notifications"></legend>
                    <table class='keys'>
                    <tr>
                        <td>Esc</td><td msg="close">close</td>
                    </tr>
                    <tr>
                        <td>D</td><td msg="dismiss">dismiss</td>
                    </tr>
                    </table>
                </fieldset>
                <label><input type="checkbox" storage="disableKeys">Disable shortcut keys</label>
            </div>
        </template>

        <template id="adminPageTemplate">
            <div id="adminPage" class="page" value="admin">

                <div class="layout horizontal col-gap">
                    <fieldset class="options selected">
                        <legend>via signed in browser user</legend>
                        <j-button id="saveSyncOptions" class="filled" icon="cloud-upload" msg="saveOptions"></j-button>
                        <j-button id="loadSyncOptions" class="filled" icon="cloud-download" msg="loadOptions"></j-button>
                    </fieldset>
                    <fieldset class="options selected">
                        <legend>via local file</legend>
                        <j-button id="exportToFileOptions" class="filled" icon="file-download" msg="exportOptions"></j-button>
                        <input type="file" id="jsonFileInput" accept=".json" hidden>
                        <j-button id="importFromFileOptions" class="filled" icon="file-upload" msg="importOptions"></j-button>
                    </fieldset>
                </div>

                <div class="layout vertical start" style="gap: 10px">
                    <j-button id="fetchCalendarSettings" class="filled" icon="settings-applications">Load Google Calendar settings</j-button>
                    <div>
                        <j-button id="show-last-dismissed-notifications" class="filled" icon="history">Show last dismissed notifications</j-button>
                        <j-button id="reset-dismissed-notifications" class="filled" icon="undo">Undo all dismissed notifications</j-button>
                        <!--j-button id="reset-last-dismissed-notifications" class="filled" icon="undo">Undo last 10 dismissed notifications</j-button-->
                        <div id="undo-notifications-list" class="card" style="margin-top:10px; padding: 20px" hidden></div>
                    </div>
                    <j-button id="resetSettings" class="filled" icon="settings">Reset Settings to Defaults</j-button>
                    <j-button id="reload-extension" class="filled" icon="refresh">Reload Extension</j-button>
                    <j-button id="polling-status" class="filled" icon="info">Polling status</j-button>
                </div>

                <fieldset class="options selected">
                    <legend style="color:red;font-weight:bold;font-size:16px">WARNING: Do not use these settings unless your developer instructs you!</legend>
                    <div style="margin:10px 0">
                        <label><input type="checkbox" id="showConsoleMessages" storage="console_messages"> <span msg="showConsoleMessages" msgToolTip="showConsoleMessagesTitle">showConsoleMessages</span></label>
                        <label><input type="checkbox" id="disableOnline" storage="disableOnline"> Disable online check</label>
                    </div>
                </fieldset>

            </div>
        </template>
    </div>
    
    <template id="runInBackgroundDialogTemplate">
        <paper-dialog id="runInBackgroundDialog" modal="true">
            <h2>Run in background</h2>
            <paper-dialog-scrollable class="dialogDescription">
                <ol>
                    <li>You must enable the Chrome > Setting > System (chrome://settings/system) <b>Continue running background apps when Google Chrome is closed"</b></li>
                    <li>Make sure you are not clearing data that prevents your Google Account from automatically sign in when you restart the browser</li>
                </ol>
            </paper-dialog-scrollable>
            <div class="buttons">
                <paper-button dialog-confirm autofocus class="okDialog"><span msg="ok"></span></paper-button>
            </div>
        </paper-dialog>
    </template>
    
    <input id="notificationSoundInputButton" type="file" accept="audio/*" hidden/>
</body>

</html>
