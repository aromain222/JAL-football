<!DOCTYPE html>

<body id="calendarExtensionPopup" class="popup" calendar-version="jdom"> <!-- v1 calendar-version="3" -->
    <header class="site-header" no-bg-color>
        <div class="header-content">
            <div class="header-start">
                <div id="quickAddWrapper" class="layout horizontal center">
                    <j-button id="quickAddGoBack" class="back" icon="arrow-back"></j-button>
                    <input type="text" id="quickAdd" autocomplete="off">
                    <label class="quick-add-options">
                        <span class="label-text" msg="addToCalendar">addToCalendar</span>
                        <select id="quickAddCalendarsMenu" j-resize>
                            <!-- Options will be populated here -->
                        </select>
                    </label>
                    <j-button id="save-quick-add" class="raised colored quick-add-options" msg="save"></j-button>
                </div>
                <div id="searchInputWrapper" class="layout horizontal center">
                    <j-button id="search-input-back" class="back" icon="arrow-back"></j-button>
                    <input id="searchInput" type="text" autocomplete="off" />
                    <select id="searchCalendarsMenu">
                        <option value="active-calendars" msg="activeCalendars">Active calendars</option>
                        <option value="all-calendars" msg="allCalendars">All calendars</option>
                    </select>
                    <j-button id="search" class="raised colored" icon="search" button-look></j-button>
                </div>                     
            </div>

            <nav class="primary-nav" aria-label="Main Navigation">
                <j-button class="side-rail-button" icon="menu" aria-label="Open menu" popovertarget-id="side-rail-menu"></j-button>
                <div class="logo-and-title">
                    <img class="logo" src="images/icons/icon-64-no-number.png"/>
                    <a main-title href="#">Checker Plus</a>
                </div>
                <div id="next-prev-buttons">
                    <j-button id="prev" msgTitle="previous" icon="chevron-left"></j-button>
                    <j-button id="next" msgTitle="next" icon="chevron-right"></j-button>
                </div>
                <div id="calendarTitle"></div><j-icon id="calendarTitleDropdown" icon="arrow-drop-down"></j-icon>
                <j-tooltip id="calendarTitleToolTip" class="delay" for="calendarTitle" msg="goToToday"></j-tooltip>

                <div id="searchInputWrapper">
                    <j-button id="back" icon="arrow-back" role="button" aria-label="search"></j-button> <j-input id="searchInput" type="text"></j-input>
                </div>
            </nav>
            
            <div class="utility-items">
                <j-button id="newsNotification" icon="new-releases" hidden></j-button>
                <j-tooltip for="newsNotification" animation-delay="100">
                    <div id="newsNotificationReducedDonationMessage" hidden style="text-align:center; white-space: nowrap; line-height: 1.2">Good news</div>
                    <div id="newsNotificationBigUpdateMessage" hidden style="text-align:center"><span msg="extensionUpdated">big update</span></div>
                </j-tooltip>

                <j-button id="pendingNotifications" class="swing" icon="notifications"></j-button>
                <j-tooltip for="pendingNotifications" msg="pendingNotifications"></j-tooltip>

                <j-button id="goToToday" icon="today" msgTitle="goToToday"></j-button>
                <j-button id="showSearch" icon="search" msgTitle="search"></j-button>

                <j-button id="share-icon-button" class="share-button" icon="share" popovertarget-id="share-menu"></j-button>
                <j-listbox id="share-menu" popover position="center">
                    <j-icon-item id="facebook">
                        <j-icon icon="facebook"></j-icon>
                        <span>Facebook</span>
                    </j-icon-item>
                    <j-icon-item id="twitter">
                        <j-icon icon="twitter"></j-icon>
                        <span>Twitter</span>
                    </j-icon-item>
                    <j-icon-item id="linkedin">
                        <j-icon icon="linkedin"></j-icon>
                        <span>LinkedIn</span>
                    </j-icon-item>
                    <j-icon-item id="share-by-email">
                        <j-icon icon="mail" style="color:#666"></j-icon>
                        <span msg="email">Email</span>
                    </j-icon-item>
                    <j-icon-item id="email-subscription">
                        <j-icon icon="markunread-mailbox" style="color:#666"></j-icon>
                        <span>Subscribe</span>
                    </j-icon-item>
                    <j-icon-item id="copy-link">
                        <j-icon icon="link" style="color:#666"></j-icon>

                <j-button id="refresh" icon="refresh" msgTitle="refresh"></j-button>

                    <j-icon-item class="options">
                        <j-icon icon="settings"></j-icon>
                        <span msg="options"></span>
                    </j-icon-item>

                    <j-item class="separator" disabled></j-item>

                    <j-icon-item id="viewAgenda">
                        <j-icon icon="view-agenda"></j-icon>
                        <span msg="agenda"></span>
                    </j-icon-item>
                    <j-icon-item id="viewListWeek">
                        <j-icon icon="list"></j-icon>
                        <span msg="list"></span>
                    </j-icon-item>
                    <j-icon-item id="viewDay">
                        <j-icon icon="view-day"></j-icon>
                        <span msg="day"></span>
                    </j-icon-item>
                    <j-icon-item id="viewWeek">
                        <j-icon icon="view-week"></j-icon>
                        <span msg="week"></span>
                    </j-icon-item>
                    <j-icon-item id="viewMonth">
                        <j-icon icon="view-module"></j-icon>
                        <span msg="month"></span>
                    </j-icon-item>
                    <j-icon-item id="viewYear" mustDonate>
                        <j-icon icon="view-module"></j-icon>
                        <span msg="year"></span>
                    </j-icon-item>
                    <j-icon-item id="viewCustom">
                        <j-icon icon="view-module"></j-icon>
                        <span id="viewXWeeksLabel"></span>
                        <j-button id="viewCustomSettings" icon="settings" style="position:absolute;inset-inline-end:2px"></j-button>
                    </j-icon-item>

                    <j-item class="separator" disabled></j-item>

                    <j-icon-item class="openSnoozedEvents">
                        <j-icon icon="snooze"></j-icon>
                        <span msg="snoozedEvents"></span>
                    </j-icon-item>

                    <j-icon-item id="quick-adds">
                        <j-icon icon="format-quote"></j-icon>
                        <span msg="quickAdd"></span>
                    </j-icon-item>

                    <j-icon-item class="skins">
                        <j-icon icon="format-paint"></j-icon>
                        <span msg="addSkinsOrThemes"></span>
                    </j-icon-item>
                    <j-icon-item class="popout">
                        <j-icon icon="open-in-new"></j-icon>
                        <span msg="popout"></span>
                    </j-icon-item>

                    <j-item class="separator" disabled></j-item>
                    
                    <j-item class="contribute"><span msg="contribute">contribute</span></j-item>
                    <j-item class="discoverMyApps"><span msg="discoverMyApps">discoverMyApps</span></j-item>
                    <j-item class="help"><span msg="help">help</span></j-item>
                </j-listbox>
            </div>
            <j-button class="close" icon="close"></j-button>
        </div>

        <div id="datepickerWrapper">
            <div id="datepicker" class="mini-calendar"></div>
        </div>
    </header>

            </div>
            <div id="event-task-selection" class="layout horizontal center" hidden>

            </div>
            <div id="event-time-related-wrapper" class="layout horizontal start">

                    <div class="layout horizontal" style="gap: 10px">

                </div>

                    <div class="repeat-placeholder">
                        <select id="repeat-dropdown" no-label-float vertical-align="top">

                            <option value="daily" msg="daily">Daily</option>
                            <option value="weekly" msg="weekly"><span>weekly</span></option>
                            <option value="every-2-weeks" msg="every2Weeks"><span>every2Weeks</span></option>
                            <option value="monthly" msg="monthly"><span>monthly</span></option>
                            <option value="yearly" msg="annually"><span>annually</span></option>
                            <option value="every-weekday" msg="everyWeekday"><span>everyWeekday</span></option>
                            <option value="custom"><span msg="custom">custom</span>...</option>
                        </select>
                    </div>
                </div>
            </div>
            <div id="eventConferenceWrapper" class="layout horizontal center" hidden>
                <j-icon id="event-conference-icon" icon="videocam" class="fieldIcon"></j-icon>
                <j-button id="eventConference" msg="addVideoConferencing">Add video conferencing</j-button>
                <j-icon-button class="copy-conference-link" icon="content-copy"></j-icon-button>
                <j-icon-button class="eventConferenceRemove" icon="close" hidden></j-icon-button>
            </div>
            <div id="eventVideoLabelWrapper" class="layout horizontal center" hidden>
                <j-icon class="fieldIcon"></j-icon>
                <div id="eventVideoLabel" style="color:gray; margin-left:5px"></div>
            </div>
            <div id="eventLocation-wrapper" class="layout horizontal center">
                <j-icon icon="place" class="fieldIcon"></j-icon>
                <div class="flex">
                    <j-input id="eventLocation" msgLabel="where" no-label-float></j-input>
                    <j-listbox id="event-location-suggestions" class="acSuggestions" popover="auto" tabindex="0"></j-listbox>
                </div>
                <j-button id="currentPage" tabIndex=-1></j-button><j-tooltip for="currentPage" style="white-space:nowrap" msg="useDetailsFromCurrentPage">Use details from current page</j-tooltip>
            </div>
            <div id="eventDescription-wrapper" class="layout horizontal center">
                <j-icon icon="short-text" class="fieldIcon self-start"></j-icon>
                <div id="eventDescription" class="flex" contenteditable="true" msgPlaceholder="eventDescription"></div>
            </div>

            <div id="createEventCalendar-wrapper" class="layout horizontal center">
                <j-icon icon="event" class="fieldIcon"></j-icon>
                <div class="layout horizontal" style="gap: 15px; align-items: center">
                    <label>
                        <select id="createEventCalendarsMenu">
                            <!-- Options will be populated here -->
                        </select>
                    </label>
                    <j-button id="eventColor"></j-button>
                </div>
                <j-tooltip for="eventColor" style="white-space:nowrap"><span msg="eventColor">eventcolor</span></j-tooltip>
            </div>

            <div id="event-task-list-wrapper" class="layout horizontal center">
                <j-icon icon="list" class="fieldIcon"></j-icon>
                <label>
                    <select id="createEventTaskList">
                        <!-- Options will be populated here -->
                    </select>
                </label>
            </div>

            <div id="event-reminders-wrapper" class="layout horizontal">
                <j-icon icon="notifications" class="fieldIcon"></j-icon>

            </div>

            <div id="event-transparency-and-visibility-wrapper" class="layout horizontal center">

                        <option value="opaque" msg="busy">busy</option>

                    <select id="event-visibility" no-label-float style="max-width: 150px;">

                        <option value="public" msg="public">public</option>
                        <option value="private" msg="private">private</option>
                    </select>
                </div>
            </div>
        </div>

    <template id="recurrenceDialogTemplate">
        <div class="layout vertical" style="gap: 20px">
            <div id="repeatEveryWrapper" class="layout horizontal center" style="gap: 10px">
                <span msg="repeatEvery">Repeat every</span>
                <j-input id="repeatEveryValue" tabindex="-1" type="number" min="1" value="1" style="width: 60px"></j-input>
                <select id="repeatEveryPeriod">
                    <option value="DAILY" msg="days">days</option>
                    <option value="WEEKLY" msg="weeks">weeks</option>
                    <option value="MONTHLY" msg="months">months</option>
                    <option value="YEARLY" msg="years">years</option>
                </select>
            </div>

            <div id="repeatOnWrapper" class="layout horizontal center" style="gap: 10px">
                <span msg="repeatOn">Repeat on</span>
                <div id="repeatOnDays" class="layout horizontal center">
                    <j-button class="raised">S</j-button>
                    <j-button class="raised">M</j-button>
                    <j-button class="raised">T</j-button>
                    <j-button class="raised">W</j-button>
                    <j-button class="raised">T</j-button>
                    <j-button class="raised">F</j-button>
                    <j-button class="raised">S</j-button>
                </div>
            </div>

            <div id="repeatMonthlyOnWrapper" class="layout horizontal center">
                <select id="repeatMonthlyOn">
                    <option value="dayX" msg="monthly">monthly</option>
                    <option value="1">monthlyOn</option>
                    <option value="2">monthlyOn</option>
                    <option value="3">monthlyOn</option>
                    <option value="4">monthlyOn</option>
                    <option value="last">monthlyOn</option>
                    <option value="-1" msg="lastDayOfMonth">lastDayOfMonth</option>
                </select>
            </div>

            <div id="repeatEndsWrapper" class="layout vertical start" style="gap: 10px">
                <span msg="ends">Ends</span>
                <div class="layout horizontal start">
                    <div class="layout vertical" style="gap: 10px">
                        <label><input type="radio" name="repeat-ends-dropdown" value="never" checked> <span msg="never"></span></label>
                        <label><input type="radio" name="repeat-ends-dropdown" value="on"> <span msg="on"></span></label>
                        <label><input type="radio" name="repeat-ends-dropdown" value="after"> <span msg="after"></span></label>
                    </div>
                    <div>
                        <div style="margin: 5px 0">&nbsp;</div>
                        <input id="repeatEndsOnDate" type="text" autocomplete="off" disabled/>
                        <div class="layout horizontal center" style="gap: 10px">
                            <j-input id="repeatEndsAfterOccurrences" disabled type="number" min="1" value="13" no-label-float="true" style="width: 70px"></j-input> <span msg="occurrences">occurrences</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>
